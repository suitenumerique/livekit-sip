name: Release to Docker

# Controls when the action will run.
on:
  workflow_dispatch:
  push:
    branches:
      - 'sip-video-v2'
    tags:
      - 'v*.*.*-sip-video'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Docker metadata
        id: docker-md
        uses: docker/metadata-action@v5
        with:
          images: lasuite/livekit-sip
          # generate Docker tags based on the following events/attributes
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build GStreamer 1.28.3 deb
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./build/sip/Dockerfile.gstreamer
          target: export
          outputs: type=local,dest=./gstout
          cache-from: type=gha,scope=gstreamer-1.28
          cache-to: type=gha,mode=max,scope=gstreamer-1.28

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push livekit-sip
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./build/sip/Dockerfile
          build-contexts: |
            gst=./gstout
          push: true
          platforms: linux/amd64
          tags: ${{ steps.docker-md.outputs.tags }}
          labels: ${{ steps.docker-md.outputs.labels }}
          cache-from: type=gha,scope=livekit-sip
          cache-to: type=gha,mode=max,scope=livekit-sip
